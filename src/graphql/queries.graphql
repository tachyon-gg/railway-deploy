query ListProjects {
  projects {
    edges {
      node {
        id
        name
      }
    }
  }
}

query GetProject($id: String!) {
  project(id: $id) {
    id
    name
    environments {
      edges {
        node {
          id
          name
          deploymentTriggers {
            edges {
              node {
                id
                branch
                checkSuites
                serviceId
                repository
              }
            }
          }
        }
      }
    }
    services {
      edges {
        node {
          id
          name
          featureFlags
          serviceInstances {
            edges {
              node {
                environmentId
                source {
                  image
                  repo
                }
                domains {
                  customDomains {
                    id
                    domain
                    targetPort
                  }
                  serviceDomains {
                    id
                    domain
                    targetPort
                  }
                }
                region
                numReplicas
                restartPolicyType
                restartPolicyMaxRetries
                healthcheckPath
                healthcheckTimeout
                cronSchedule
                startCommand
                buildCommand
                rootDirectory
                dockerfilePath
                preDeployCommand
                sleepApplication
                builder
                watchPatterns
                drainingSeconds
                overlapSeconds
                ipv6EgressEnabled
                railwayConfigFile
              }
            }
          }
        }
      }
    }
    buckets {
      edges {
        node {
          id
          name
        }
      }
    }
    volumes {
      edges {
        node {
          id
          name
          volumeInstances {
            edges {
              node {
                id
                mountPath
                environmentId
                serviceId
              }
            }
          }
        }
      }
    }
  }
}

query GetVariables($projectId: String!, $environmentId: String!, $serviceId: String!) {
  variables(
    projectId: $projectId
    environmentId: $environmentId
    serviceId: $serviceId
    unrendered: true
  )
}

query GetSharedVariables($projectId: String!, $environmentId: String!) {
  variables(projectId: $projectId, environmentId: $environmentId, unrendered: true)
}

query GetTcpProxies($serviceId: String!, $environmentId: String!) {
  tcpProxies(serviceId: $serviceId, environmentId: $environmentId) {
    id
    applicationPort
    proxyPort
    domain
  }
}

query GetServiceInstanceLimits($serviceId: String!, $environmentId: String!) {
  serviceInstanceLimits(serviceId: $serviceId, environmentId: $environmentId)
}

query GetEgressGateways($serviceId: String!, $environmentId: String!) {
  egressGateways(serviceId: $serviceId, environmentId: $environmentId) {
    ipv4
    region
  }
}
