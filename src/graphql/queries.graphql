query ListProjects {
  projects {
    edges {
      node {
        id
        name
      }
    }
  }
}

query GetProject($id: String!) {
  project(id: $id) {
    id
    name
    environments {
      edges {
        node {
          id
          name
        }
      }
    }
    services {
      edges {
        node {
          id
          name
          serviceInstances {
            edges {
              node {
                environmentId
                domains {
                  customDomains {
                    id
                    domain
                    targetPort
                  }
                  serviceDomains {
                    id
                    domain
                    targetPort
                  }
                }
              }
            }
          }
        }
      }
    }
    volumes {
      edges {
        node {
          id
          name
          volumeInstances {
            edges {
              node {
                id
                mountPath
                environmentId
                serviceId
              }
            }
          }
        }
      }
    }
    buckets {
      edges {
        node {
          id
          name
        }
      }
    }
  }
}

query GetEgressGateways($serviceId: String!, $environmentId: String!) {
  egressGateways(serviceId: $serviceId, environmentId: $environmentId) {
    ipv4
    region
  }
}

query GetEnvironmentConfig($environmentId: String!) {
  environment(id: $environmentId) {
    config(decryptVariables: true)
  }
}

query GetTcpProxies($serviceId: String!, $environmentId: String!) {
  tcpProxies(serviceId: $serviceId, environmentId: $environmentId) {
    id
    applicationPort
    domain
    proxyPort
  }
}

query GetPrivateNetworks($environmentId: String!) {
  privateNetworks(environmentId: $environmentId) {
    publicId
    name
    dnsName
  }
}

query GetPrivateNetworkEndpoint(
  $environmentId: String!
  $privateNetworkId: String!
  $serviceId: String!
) {
  privateNetworkEndpoint(
    environmentId: $environmentId
    privateNetworkId: $privateNetworkId
    serviceId: $serviceId
  ) {
    publicId
    dnsName
    serviceInstanceId
  }
}
