mutation ServiceCreate($input: ServiceCreateInput!) {
  serviceCreate(input: $input) {
    id
    name
  }
}

mutation ServiceDelete($id: String!) {
  serviceDelete(id: $id)
}

mutation VolumeCreate($input: VolumeCreateInput!) {
  volumeCreate(input: $input) {
    id
    name
  }
}

mutation VolumeUpdate($volumeId: String!, $input: VolumeUpdateInput!) {
  volumeUpdate(volumeId: $volumeId, input: $input) {
    id
    name
  }
}

mutation EnvironmentDelete($id: String!) {
  environmentDelete(id: $id)
}

mutation EnvironmentCreate($input: EnvironmentCreateInput!) {
  environmentCreate(input: $input) {
    id
    name
  }
}

mutation EgressGatewayAssociationCreate($input: EgressGatewayCreateInput!) {
  egressGatewayAssociationCreate(input: $input) {
    ipv4
    region
  }
}

mutation EgressGatewayAssociationsClear($input: EgressGatewayServiceTargetInput!) {
  egressGatewayAssociationsClear(input: $input)
}

mutation EnvironmentStageChanges(
  $environmentId: String!
  $input: EnvironmentConfig!
  $merge: Boolean
) {
  environmentStageChanges(environmentId: $environmentId, input: $input, merge: $merge) {
    id
    status
  }
}

mutation EnvironmentPatchCommitStaged(
  $environmentId: String!
  $commitMessage: String
  $skipDeploys: Boolean
) {
  environmentPatchCommitStaged(
    environmentId: $environmentId
    commitMessage: $commitMessage
    skipDeploys: $skipDeploys
  )
}
