mutation ServiceCreate($input: ServiceCreateInput!) {
  serviceCreate(input: $input) {
    id
    name
  }
}

mutation ServiceDelete($id: String!) {
  serviceDelete(id: $id)
}

mutation VolumeCreate($input: VolumeCreateInput!) {
  volumeCreate(input: $input) {
    id
    name
  }
}

mutation VolumeUpdate($volumeId: String!, $input: VolumeUpdateInput!) {
  volumeUpdate(volumeId: $volumeId, input: $input) {
    id
    name
  }
}

mutation BucketCreate($input: BucketCreateInput!) {
  bucketCreate(input: $input) {
    id
    name
  }
}

mutation VolumeDelete($volumeId: String!) {
  volumeDelete(volumeId: $volumeId)
}

mutation CustomDomainCreate($input: CustomDomainCreateInput!) {
  customDomainCreate(input: $input) {
    id
    domain
  }
}

mutation CustomDomainDelete($id: String!) {
  customDomainDelete(id: $id)
}

mutation CustomDomainUpdate($id: String!, $environmentId: String!, $targetPort: Int) {
  customDomainUpdate(id: $id, environmentId: $environmentId, targetPort: $targetPort)
}

mutation ServiceDomainCreate($input: ServiceDomainCreateInput!) {
  serviceDomainCreate(input: $input) {
    id
    domain
  }
}

mutation ServiceDomainDelete($id: String!) {
  serviceDomainDelete(id: $id)
}

mutation ServiceDomainUpdate($input: ServiceDomainUpdateInput!) {
  serviceDomainUpdate(input: $input)
}

mutation EnvironmentDelete($id: String!) {
  environmentDelete(id: $id)
}

mutation EnvironmentCreate($input: EnvironmentCreateInput!) {
  environmentCreate(input: $input) {
    id
    name
  }
}

mutation EgressGatewayAssociationCreate($input: EgressGatewayCreateInput!) {
  egressGatewayAssociationCreate(input: $input) {
    ipv4
    region
  }
}

mutation EgressGatewayAssociationsClear($input: EgressGatewayServiceTargetInput!) {
  egressGatewayAssociationsClear(input: $input)
}

mutation EnvironmentStageChanges(
  $environmentId: String!
  $input: EnvironmentConfig!
  $merge: Boolean
) {
  environmentStageChanges(environmentId: $environmentId, input: $input, merge: $merge) {
    id
    status
  }
}

mutation PrivateNetworkEndpointDelete($id: String!) {
  privateNetworkEndpointDelete(id: $id)
}

mutation PrivateNetworkEndpointRename($id: String!, $dnsName: String!, $privateNetworkId: String!) {
  privateNetworkEndpointRename(id: $id, dnsName: $dnsName, privateNetworkId: $privateNetworkId)
}

mutation TcpProxyDelete($id: String!) {
  tcpProxyDelete(id: $id)
}

mutation EnvironmentPatchCommitStaged(
  $environmentId: String!
  $commitMessage: String
  $skipDeploys: Boolean
) {
  environmentPatchCommitStaged(
    environmentId: $environmentId
    commitMessage: $commitMessage
    skipDeploys: $skipDeploys
  )
}
